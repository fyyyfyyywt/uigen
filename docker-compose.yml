services:
  # The main web application
  uigen-web:
    container_name: uigen-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - DATABASE_URL=file:/app/db/dev.db
      - REDIS_URL=redis://uigen-redis:6379
    volumes:
      - ./db:/app/db
    depends_on:
      - uigen-redis
    networks:
      - uigen-network

  # Redis for session/caching
  uigen-redis:
    image: redis:alpine
    container_name: uigen-redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - uigen-network

volumes:
  redis_data:

networks:
  # Internal network for the uigen containers to communicate
  uigen-network:
    driver: bridge
